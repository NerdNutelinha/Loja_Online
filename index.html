<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Raquel</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'serif';
            cursor: pointer;
            transition: background-color 0.5s ease;
        }
        .container {
            text-align: center;
            color: white;
            z-index: 10;
        }
        #nome {
            font-size: 4rem;
            color: #ff1493; /* Começa Rosa Choque */
            text-shadow: 0 0 20px #ff1493;
            animation: brilho 1.5s infinite alternate;
            margin: 0;
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }
        .frase {
            font-style: italic;
            font-size: 1.2rem;
            margin-top: 20px;
            opacity: 0.8;
            padding: 0 20px;
            transition: color 0.5s ease;
        }
        @keyframes brilho {
            from { text-shadow: 0 0 10px currentColor; }
            to { text-shadow: 0 0 30px currentColor, 0 0 50px currentColor; }
        }
        .coracao {
            position: absolute;
            bottom: -50px;
            color: #ff1493; /* Começa Rosa */
            font-size: 25px;
            user-select: none;
            animation: subir linear infinite;
            transition: color 0.5s ease;
        }
        @keyframes subir {
            to {
                transform: translateY(-110vh) translateX(30px);
                opacity: 0;
            }
        }
    </style>
</head>
<body onclick="mudarCorLoop()">

    <div class="container">
        <h1 id="nome">Raquel</h1>
        <p class="frase">"Um nó de três cordas não se quebra facilmente."</p>
        <p id="assinatura" style="font-size: 0.8rem; margin-top: 40px; opacity: 0.5;">Geovany & Raquel</p>
    </div>

    <script>
        let corAtual = 0; // 0=Rosa, 1=Vermelho, 2=Laranja
        const cores = [
            { corPrimaria: "#ff1493", texto: "white", bg: "#000" }, // Rosa Choque (Original)
            { corPrimaria: "#ff0000", texto: "white", bg: "#000" }, // Vermelho Vivo
            { corPrimaria: "#ff8c00", texto: "white", bg: "#000" }, // Laranja Escuro
            { corPrimaria: "#ff0000", texto: "white", bg: "#000" } // Vermelho (Volta pro Vermelho)
        ];

        function criarCoracao() {
            const c = document.createElement("div");
            c.classList.add("coracao");
            // O novo coração já nasce com a cor do modo atual
            c.style.color = cores[corAtual].corPrimaria;
            c.innerHTML = "❤";
            c.style.left = Math.random() * 100 + "vw";
            c.style.animationDuration = (Math.random() * 3 + 2) + "s";
            c.style.opacity = Math.random();
            document.body.appendChild(c);
            
            setTimeout(() => { c.remove(); }, 5000);
        }

        setInterval(criarCoracao, 250);

        function mudarCorLoop() {
            // Avança para a próxima cor no loop
            corAtual = (corAtual + 1) % cores.length;
            
            // Aplica as novas cores nos elementos
            const nome = document.getElementById('nome');
            const corpo = document.body;
            const frase = document.querySelector('.frase');
            
            nome.style.color = cores[corAtual].corPrimaria;
            nome.style.textShadow = `0 0 20px ${cores[corAtual].corPrimaria}`;
            frase.style.color = cores[corAtual].texto;
            corpo.style.backgroundColor = cores[corAtual].bg;
            
            // Muda a cor de todos os corações que já estão na tela
            document.querySelectorAll('.coracao').forEach(c => {
                c.style.color = cores[corAtual].corPrimaria;
            });
        }
    </script>
</body>
</html>
