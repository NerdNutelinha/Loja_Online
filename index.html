<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EXCLUSIVO - RG</title>
    <style>
        body {
            background-color: #050505;
            color: #ff1493;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .login-box {
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #ff1493;
            border-radius: 10px;
            box-shadow: 0 0 20px #ff1493;
            width: 320px;
            transition: 0.3s;
        }
        @keyframes vibrar {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .erro-vibrar {
            animation: vibrar 0.3s linear;
            border-color: red !important;
            box-shadow: 0 0 30px red !important;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #ff1493;
            color: white;
            border-radius: 0;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ff1493;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }
        button:hover {
            box-shadow: 0 0 30px #ff1493;
        }
        #mensagem-erro {
            color: #ff69b4;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-box" id="caixa-login">
        <h2>SISTEMA RG</h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">ACESSO RESTRITO À RAQUEL</p>
        <input type="text" id="campo-senha" placeholder="Frase secreta..." onkeypress="verificarEnter(event)">
        <button onclick="entrar()">ENTRAR NO SISTEMA</button>
        <div id="mensagem-erro">
            Raquel, você errou, coloque: <br>
            <span style="color: white; font-size: 1.1rem;">"Amo Muito Você"</span> <br>
            e aperte enter meu amor ♥️💍♥️
        </div>
    </div>
    <script>
        function entrar() {
            const senhaDigitada = document.getElementById('campo-senha').value;
            const caixa = document.getElementById('caixa-login');
            const mensagem = document.getElementById('mensagem-erro');
            if (senhaDigitada === "Amo Muito Você") {
                // REDIRECIONA PARA A PÁGINA PRINCIPAL
                // Vamos usar um nome diferente para o arquivo principal
                window.location.href = "surpresa.html"; 
            } else {
                caixa.classList.remove('erro-vibrar');
                void caixa.offsetWidth;
                caixa.classList.add('erro-vibrar');
                mensagem.style.display = 'block';
            }
        }
        function verificarEnter(event) {
            if (event.key === "Enter") { entrar(); }
        }
    </script>
</body>
</html>
