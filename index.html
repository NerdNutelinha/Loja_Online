<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Raquel</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'serif';
            transition: background-color 2s ease; /* Transição suave de fundo */
            cursor: pointer;
        }
        .container {
            text-align: center;
            color: white;
            z-index: 10;
        }
        #nome {
            font-size: 4rem;
            color: #ff1493; /* Começa Rosa Choque */
            text-shadow: 0 0 20px #ff1493;
            animation: brilho 1.5s infinite alternate;
            margin: 0;
            transition: color 2s ease, text-shadow 2s ease;
        }
        .frase {
            font-style: italic;
            font-size: 1.2rem;
            margin-top: 20px;
            opacity: 0.8;
            padding: 0 20px;
            transition: color 2s ease;
        }
        @keyframes brilho {
            from { text-shadow: 0 0 10px currentColor; }
            to { text-shadow: 0 0 30px currentColor, 0 0 50px currentColor; }
        }
        .coracao {
            position: absolute;
            bottom: -50px;
            color: #ff1493; /* Começa Rosa */
            font-size: 25px;
            user-select: none;
            animation: subir linear infinite;
            transition: color 2s ease;
        }
        @keyframes subir {
            to {
                transform: translateY(-110vh) translateX(30px);
                opacity: 0;
            }
        }

        /* Classe que será ativada pelo clique/print */
        .modo-print {
            background-color: #fff !important; /* Fundo vira Branco */
        }
        .modo-print #nome {
            color: #ff0000 !important; /* Nome vira Vermelho Vivo */
            text-shadow: 0 0 20px #ff0000 !important;
        }
        .modo-print .frase {
            color: #000 !important; /* Texto vira Preto para ler no branco */
        }
        .modo-print .coracao {
            color: #ff0000 !important; /* Corações viram Vermelhos */
        }
    </style>
</head>
<body onclick="ativarModoPrint()" id="corpo">

    <div class="container">
        <h1 id="nome">Raquel</h1>
        <p class="frase">"Um nó de três cordas não se quebra facilmente."</p>
        <p id="assinatura" style="font-size: 0.8rem; margin-top: 40px; opacity: 0.5;">Geovany & Raquel</p>
    </div>

    <script>
        let modoEspecial = false;

        function criarCoracao() {
            const c = document.createElement("div");
            c.classList.add("coracao");
            // Se o modo especial estiver ativo, o novo coração já nasce vermelho
            if (modoEspecial) {
                c.style.color = "#ff0000";
            }
            c.innerHTML = "❤";
            c.style.left = Math.random() * 100 + "vw";
            c.style.animationDuration = (Math.random() * 3 + 2) + "s";
            c.style.opacity = Math.random();
            document.body.appendChild(c);
            
            setTimeout(() => { c.remove(); }, 5000);
        }

        setInterval(criarCoracao, 250);

        function activarModoPrint() {
            if (!modoEspecial) {
                modoEspecial = true;
                document.getElementById('corpo').classList.add('modo-print');
                document.getElementById('assinatura').style.color = "#000";
                document.getElementById('assinatura').style.opacity = "1";
            }
        }
    </script>
</body>
</html>
