<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Raquel</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'serif';
            cursor: pointer;
            transition: 0.8s;
        }
        .container { text-align: center; color: white; z-index: 10; }
        
        #nome {
            font-size: 4rem;
            color: #ff1493;
            text-shadow: 0 0 20px currentColor;
            animation: brilho 1.5s infinite alternate;
            margin: 0;
            transition: 0.8s;
        }

        .frase {
            font-style: italic; 
            margin-top: 20px; 
            opacity: 0.9;
            font-size: 1.2rem;
            transition: 0.8s;
        }

        /* ESTILO DA ASSINATURA */
        #assinatura {
            margin-top: 50px;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1rem;
            transition: 0.8s;
            color: #ff1493; /* Começa rosa também */
        }

        @keyframes brilho {
            from { text-shadow: 0 0 10px currentColor; }
            to { text-shadow: 0 0 30px currentColor, 0 0 50px currentColor; }
        }

        .coracao {
            position: absolute;
            bottom: -50px;
            font-size: 25px;
            animation: subir linear infinite;
            transition: color 0.8s ease;
        }
        @keyframes subir { to { transform: translateY(-110vh) translateX(30px); opacity: 0; } }
    </style>
</head>
<body onclick="mudarCorLoop()">

    <div class="container">
        <h1 id="nome">Raquel</h1>
        <p class="frase">"Um nó de três cordas não se quebra facilmente."</p>
        
        <div id="assinatura">Geovany & Raquel</div>
    </div>

    <script>
        let corAtual = 0;
        const cores = ["#ff1493", "#ff4500", "#ffd700", "#00bfff", "#f0f8ff", "#ff0000"];

        function criarCoracao() {
            const c = document.createElement("div");
            c.classList.add("coracao");
            c.style.color = cores[corAtual];
            c.innerHTML = "❤";
            c.style.left = Math.random() * 100 + "vw";
            c.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 5000);
        }

        setInterval(criarCoracao, 250);

        function mudarCorLoop() {
            corAtual = (corAtual + 1) % cores.length;
            const novaCor = cores[corAtual];
            
            // Atualiza o nome dela
            document.getElementById('nome').style.color = novaCor;
            
            // ATUALIZA A ASSINATURA TAMBÉM!
            document.getElementById('assinatura').style.color = novaCor;
            
            // Atualiza os corações
            document.querySelectorAll('.coracao').forEach(c => c.style.color = novaCor);
        }
    </script>
</body>
</html>
